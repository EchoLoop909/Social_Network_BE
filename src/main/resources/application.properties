# ========================
# Keycloak / OAuth2 (SSO)
# ========================
# Địa chỉ server Keycloak (KHÔNG có dấu / ở cuối)
keycloak.auth-server-url=http://localhost:8080
# Tên Realm đã tạo trên Keycloak
keycloak.realm=social-network
# Client đăng ký trên Keycloak (dùng cho luồng đăng nhập proxy / gọi Admin API)
idp.client-id=social-network-api
idp.client-secret=CHANGE_ME_CLIENT_SECRET

# Spring Resource Server: tự tải JWKS để verify chữ ký JWT offline
spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs

